name: "𖠀 Free VPS Server"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: vps-server
  cancel-in-progress: true

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 335
    steps:
      - uses: actions/checkout@v4

      - name: Show Specs
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║       FREE VPS - SYSTEM INFO             ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║ CPU: $(nproc) cores"
          echo "║ RAM: $(free -h | awk '/^Mem:/ {print $2}')"
          echo "║ Disk: $(df -h / | awk 'NR==2 {print $2}')"
          echo "║ OS: $(lsb_release -ds 2>/dev/null || cat /etc/os-release | grep PRETTY_NAME | cut -d\" -f2)"
          echo "╚══════════════════════════════════════════╝"

      - name: Install Packages
        run: |
          sudo apt update -y
          sudo apt install -y python3 python3-pip git curl wget tmux htop \
            neofetch nano vim build-essential cmake nodejs npm \
            screen mc ncdu net-tools dnsutils zip unzip

      - name: Setup Environment
        run: |
          cat >> ~/.bashrc << 'EOF'
          alias ll='ls -la'
          alias update='sudo apt update && sudo apt upgrade -y'
          export TERM=xterm-256color
          EOF

      - name: SSH Access (tmate)
        uses: mxschmitt/action-tmate@v3
        with:
          sudo: true
          limit-access-to-actor: false
        timeout-minutes: 330
